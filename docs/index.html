<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennis Predictor v2</title>
<style>
:root {
  --bg:      #080c10;
  --bg2:     #0f1419;
  --bg3:     #161d26;
  --bg4:     #1d2733;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --accent:  #c8ff00;
  --accent2: rgba(200,255,0,0.12);
  --accent3: rgba(200,255,0,0.06);
  --text:    #e8edf2;
  --text2:   #7a8a99;
  --text3:   #3d4d5c;
  --green:   #00e676;
  --green2:  rgba(0,230,118,0.10);
  --red:     #ff4757;
  --red2:    rgba(255,71,87,0.10);
  --orange:  #ffb300;
  --orange2: rgba(255,179,0,0.10);
  --blue:    #40c4ff;
  --blue2:   rgba(64,196,255,0.10);
  --mono:    'SF Mono','Fira Code','Cascadia Code',monospace;
  --r:       8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:20px;}
.nav-brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--accent);text-transform:uppercase;flex:1;}
.nav-pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.nav-link{font-size:12px;color:var(--text2);text-decoration:none;padding:5px 10px;border-radius:6px;transition:.15s;}
.nav-link:hover,.nav-link.active{color:var(--accent);background:var(--accent3);}
.nav-time{font-size:11px;color:var(--text3);font-family:var(--mono);}

/* LAYOUT */
.wrap{max-width:900px;margin:0 auto;padding:24px 16px 80px;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:.15s;letter-spacing:.02em;}
.btn:hover{background:var(--bg4);border-color:rgba(255,255,255,.18);}
.btn:active{transform:scale(.97);}
.btn-accent{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:0 0 20px rgba(200,255,0,.15);}
.btn-accent:hover{background:#d4ff1a;color:#000;}
.btn svg{width:13px;height:13px;flex-shrink:0;}
.spacer{flex:1;}
.gen-time{font-size:11px;color:var(--text3);font-family:var(--mono);}

/* PROGRESS */
.prog-wrap{height:2px;background:var(--border);border-radius:1px;margin-bottom:16px;display:none;}
.prog-wrap.on{display:block;}
.prog-bar{height:100%;background:var(--accent);width:0;transition:width .5s ease;border-radius:1px;}

/* SUMMARY GRID */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px;}
@media(max-width:560px){.summary{grid-template-columns:repeat(2,1fr);}}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px;}
.val-accent{color:var(--accent);}
.val-white{color:var(--text);}

/* SECTION HEADER */
.section-head{display:flex;align-items:center;gap:10px;margin:24px 0 12px;}
.sh-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.sh-line{flex:1;height:1px;background:var(--border);}
.sh-count{font-size:10px;color:var(--text3);font-family:var(--mono);}

/* DATE SEPARATOR */
.date-sep{display:flex;align-items:center;gap:10px;margin:20px 0 4px;}
.date-sep-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap;padding:2px 8px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);}
.date-sep-line{flex:1;height:1px;background:var(--border);}

/* TOURNAMENT HEADER */
.tourn-head{display:flex;align-items:center;gap:10px;margin:16px 0 8px;cursor:pointer;user-select:none;}
.tourn-head:hover .tourn-name{color:var(--accent);}
.tourn-name{font-size:15px;font-weight:800;letter-spacing:-.2px;color:var(--accent);white-space:nowrap;transition:color .15s;}
.tourn-line{flex:1;height:1px;background:var(--border);}
.tourn-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tourn-count{font-size:10px;color:var(--text3);font-family:var(--mono);}
.tourn-chevron{width:14px;height:14px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.tourn-chevron.open{transform:rotate(180deg);}
.tourn-body.collapsed{display:none;}

/* MATCH CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.card.ev-play{border-color:rgba(200,255,0,.28);box-shadow:0 0 0 1px rgba(200,255,0,.06);}
.card.ev-play:hover{border-color:rgba(200,255,0,.5);}
.card:not(.ev-play):hover{border-color:var(--border2);}

/* CONFIDENCE BANNER — barre colorée en haut de la carte selon confiance */
.conf-bar{height:3px;width:100%;}
.conf-1{background:var(--text3);}
.conf-2{background:var(--orange);}
.conf-3{background:var(--orange);}
.conf-4{background:var(--accent);}
.conf-5{background:var(--accent);box-shadow:0 0 8px rgba(200,255,0,.4);}

/* Card header */
.card-head{display:flex;align-items:flex-start;gap:10px;padding:12px 14px 10px;flex-wrap:wrap;}
.card-players{font-size:14px;font-weight:700;flex:1;letter-spacing:-.2px;}
.card-players em{font-weight:400;font-style:normal;color:var(--text3);}
.card-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.surf-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);}
.time-tag{font-size:10px;font-weight:700;color:var(--text2);font-family:var(--mono);}
.date-tomorrow{font-size:9px;background:var(--orange2);color:var(--orange);border-radius:3px;padding:1px 5px;font-weight:700;letter-spacing:.04em;}

/* Badge EV */
.ev-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.ev-pos{background:var(--accent2);color:var(--accent);border:1px solid rgba(200,255,0,.3);}
.ev-neg{background:var(--red2);color:var(--red);border:1px solid rgba(255,71,87,.2);}
.ev-neu{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}

/* CONFIDENCE DISPLAY */
.conf-display{display:flex;align-items:center;gap:6px;padding:6px 14px 0;}
.conf-stars{display:inline-flex;gap:3px;}
.conf-star{width:10px;height:10px;border-radius:50%;}
.conf-star.on-5{background:var(--accent);box-shadow:0 0 4px rgba(200,255,0,.5);}
.conf-star.on-4{background:var(--accent);}
.conf-star.on-3{background:var(--orange);}
.conf-star.on-2{background:var(--orange);opacity:.7;}
.conf-star.on-1{background:var(--text3);}
.conf-star.off{background:var(--bg4);}
.conf-label{font-size:10px;color:var(--text3);font-family:var(--mono);}
.conf-label.high{color:var(--accent);}
.conf-label.med{color:var(--orange);}
.conf-label.low{color:var(--text3);}

/* Predictions grid */
.pred-grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);margin-top:8px;}
@media(max-width:480px){.pred-grid{grid-template-columns:1fr;}}
.pred-cell{padding:10px 14px;border-right:1px solid var(--border);}
.pred-cell:last-child{border-right:none;}
.pred-label{font-size:9px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
.pred-main{font-size:16px;font-weight:700;font-family:var(--mono);letter-spacing:-.3px;line-height:1.2;}
.pred-pct{font-size:11px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:5px;}

/* Pred recommendation pill */
.pred-rec{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:5px;font-family:var(--mono);}
.rec-over{background:var(--accent2);color:var(--accent);border:1px solid rgba(200,255,0,.2);}
.rec-under{background:var(--green2);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.rec-2sets{background:var(--accent2);color:var(--accent);border:1px solid rgba(200,255,0,.2);}
.rec-3sets{background:var(--orange2);color:var(--orange);border:1px solid rgba(255,179,0,.2);}
.rec-neutral{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}

/* Pred confidence mini stars */
.mini-stars{display:inline-flex;gap:2px;vertical-align:middle;}
.mini-star{width:6px;height:6px;border-radius:50%;}
.mini-star.on{background:var(--accent);}
.mini-star.on-orange{background:var(--orange);}
.mini-star.off{background:var(--bg4);}

/* Reason bar */
.reason-bar{margin:0 14px 10px;padding:6px 10px;background:var(--bg3);border-radius:6px;font-size:11px;color:var(--text2);font-family:var(--mono);border-left:2px solid var(--accent2);}
.reason-bar.dim{border-left-color:var(--border);}

/* Features toggle */
.feat-toggle{font-size:10px;color:var(--text3);cursor:pointer;padding:6px 14px 10px;display:flex;align-items:center;gap:5px;border-top:1px solid var(--border);}
.feat-toggle:hover{color:var(--text2);}
.feat-panel{padding:10px 14px 12px;border-top:1px solid var(--border);background:var(--bg);display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.fp-item{font-size:10px;}
.fp-label{color:var(--text3);margin-bottom:1px;}
.fp-val{font-family:var(--mono);color:var(--text2);}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-t{font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;font-size:12px;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;max-width:300px;pointer-events:none;}
.toast.on{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(200,255,0,.4);color:var(--accent);}
.toast.err{border-color:rgba(255,71,87,.4);color:var(--red);}

footer{border-top:1px solid var(--border);padding:12px 20px;font-size:10px;color:var(--text3);font-family:var(--mono);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-top:40px;}
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><div class="nav-pulse"></div>Tennis Predictor</div>
  <a href="index.html" class="nav-link active">Bulletin</a>
  <a href="history.html" class="nav-link">Historique</a>
  <a href="log.html" class="nav-link">Log</a>
  <span class="nav-time" id="navDate"></span>
</nav>

<div class="wrap">
  <div class="toolbar">
    <button class="btn btn-accent" onclick="load()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="5.5"/><path d="M7 4.5v2.5l1.5 1.5"/></svg>
      Analyse du jour
    </button>
    <button class="btn" onclick="showInfo()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="5.5"/><path d="M7 9.5V7M7 4.5v.5"/></svg>
      Info pipeline
    </button>
    <div class="spacer"></div>
    <span class="gen-time" id="genTime"></span>
  </div>

  <div class="prog-wrap" id="prog"><div class="prog-bar" id="progBar"></div></div>

  <div class="summary">
    <div class="stat-box"><div class="stat-label">Matchs analysés</div><div class="stat-val val-white" id="sTotal">—</div><div class="stat-sub">ATP + WTA 500+</div></div>
    <div class="stat-box"><div class="stat-label">Paris EV+</div><div class="stat-val val-accent" id="sEV">—</div><div class="stat-sub">edge > +5%</div></div>
    <div class="stat-box"><div class="stat-label">Avec cotes</div><div class="stat-val val-white" id="sOdds">—</div><div class="stat-sub">Bet365 auto</div></div>
    <div class="stat-box"><div class="stat-label">Bankroll</div><div class="stat-val val-accent" id="sBankroll">—</div><div class="stat-sub">Kelly ×0.25</div></div>
  </div>

  <div class="section-head">
    <span class="sh-title">Matchs du jour — par tournoi</span>
    <div class="sh-line"></div>
    <span class="sh-count" id="evCount">—</span>
  </div>
  <div id="evList"><div class="empty"><div class="spin"></div><div class="empty-t" style="margin-top:12px">Chargement...</div></div></div>
</div>

<footer>
  <span>Tennis Predictor v2 · Elo + API + Bet365</span>
  <span id="footStatus">—</span>
</footer>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const SURF={'Grass':'🌿 Gazon','Clay':'🟫 Terre','Hard':'⬛ Dur','I.hard':'⬛ Dur Indoor'};

// Date helpers
const TODAY = new Date().toISOString().slice(0,10);
function friendlyDate(d){
  if(!d) return '';
  const dt = new Date(d+'T12:00:00');
  return dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}
function isToday(d){ return d===TODAY; }
function isTomorrow(d){
  const t=new Date(); t.setDate(t.getDate()+1);
  return d===t.toISOString().slice(0,10);
}

// Confidence stars — couleur selon niveau
function confStars(n, size=8){
  const color = n>=4?'on-4 on-5':'on-3';
  return [...Array(5)].map((_,i)=>`<span class="mini-star ${i<n?(n>=4?'on':'on-orange'):'off'}" style="width:${size}px;height:${size}px"></span>`).join('');
}

// Confidence label
function confLabel(n){
  if(n>=5) return {text:'Très élevée',cls:'high'};
  if(n>=4) return {text:'Élevée',cls:'high'};
  if(n>=3) return {text:'Moyenne',cls:'med'};
  if(n>=2) return {text:'Faible',cls:'low'};
  return {text:'Très faible',cls:'low'};
}

// Confidence bar color class
function confBarClass(n){
  if(n>=4) return 'conf-4';
  if(n>=3) return 'conf-3';
  if(n>=2) return 'conf-2';
  return 'conf-1';
}

const now = new Date();
$('navDate').textContent = now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});

function toast(msg,type='ok'){
  const t=$('toast');t.textContent=msg;t.className=`toast on ${type}`;
  setTimeout(()=>t.className='toast',3200);
}
function prog(p){$('progBar').style.width=p+'%';}
function loading(on){
  $('prog').className=on?'prog-wrap on':'prog-wrap';
  document.querySelectorAll('.btn').forEach(b=>b.disabled=on);
  if(!on)prog(0);
}
function showInfo(){
  toast('Pipeline automatique chaque nuit à 04h00 UTC · Sources : RapidAPI + TML-Database + MCP');
}

async function load(){
  loading(true);prog(20);
  try{
    prog(50);
    const res = await fetch('data/predictions.json?v='+Date.now());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    prog(90);
    render(data);
    const gt = new Date(data.generated_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    $('genTime').textContent = `Généré à ${gt}`;
    toast(`${data.summary.ev_plus_count} paris EV+ · ${data.summary.matches_analysed} matchs`);
  }catch(e){
    $('evList').innerHTML=`<div class="empty"><div class="empty-t" style="color:var(--red)">Erreur : ${e.message}</div></div>`;
    toast('Erreur de chargement','err');
  }finally{loading(false);}
}

function render(data){
  const matches = data.matches||[];
  const ev      = matches.filter(m=>m.winner.ev_status==='play');
  $('sTotal').textContent    = matches.length;
  $('sEV').textContent       = ev.length;
  $('sOdds').textContent     = data.summary.matches_with_odds||0;
  $('sBankroll').textContent = (data.summary.total_kelly_pct||0).toFixed(1)+'%';
  $('evCount').textContent   = matches.length+' matchs';

  if(matches.length===0){
    $('evList').innerHTML=`<div class="empty"><div class="empty-t">Aucun match aujourd'hui</div></div>`;
    return;
  }

  // Trier : date d'abord, puis heure
  const sorted = [...matches].sort((a,b)=>{
    const da = a.date||'9999';
    const db = b.date||'9999';
    if(da!==db) return da.localeCompare(db);
    const ta = a.time==='TBD'?'99:99':a.time;
    const tb = b.time==='TBD'?'99:99':b.time;
    return ta.localeCompare(tb);
  });

  // Grouper par date puis par tournoi
  const byDate = {};
  for(const m of sorted){
    const d = m.date||'';
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(m);
  }

  let html = '';
  let tournIdx = 0;

  for(const [date, dayMatches] of Object.entries(byDate)){
    const today   = isToday(date);
    const tomorrow = isTomorrow(date);
    const dayLabel = today ? 'Aujourd\'hui' : tomorrow ? 'Demain' : friendlyDate(date);

    html += `<div class="date-sep">
      <span class="date-sep-label">${dayLabel} · ${friendlyDate(date)}</span>
      <div class="date-sep-line"></div>
    </div>`;

    // Grouper par tournoi dans ce jour
    const byTourn = {};
    const tournOrder = [];
    for(const m of dayMatches){
      const t = m.tournament||'Inconnu';
      if(!byTourn[t]){ byTourn[t]=[]; tournOrder.push(t); }
      byTourn[t].push(m);
    }

    for(const tournName of tournOrder){
      const group = byTourn[tournName];
      const tid   = 'tourn_'+tournIdx++;
      const evInGroup = group.filter(m=>m.winner.ev_status==='play').length;
      const evBadge = evInGroup>0
        ? `<span style="font-size:10px;background:var(--accent2);color:var(--accent);border:1px solid rgba(200,255,0,.3);border-radius:10px;padding:1px 7px;font-family:var(--mono);font-weight:700">${evInGroup} EV+</span>`
        : '';
      const chevron = `<svg class="tourn-chevron open" id="chev_${tid}" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4.5l5 5 5-5"/></svg>`;

      html += `<div class="tourn-head" onclick="toggleTournament('${tid}')">
        <span class="tourn-name">${tournName}</span>
        <div class="tourn-line"></div>
        <div class="tourn-meta">
          ${evBadge}
          <span class="tourn-count">${group.length} match${group.length>1?'s':''}</span>
          ${chevron}
        </div>
      </div>
      <div class="tourn-body" id="${tid}">
        ${group.map(m=>cardHTML(m, m.winner.ev_status==='play', tomorrow)).join('')}
      </div>`;
    }
  }

  $('evList').innerHTML = html;
  $('footStatus').textContent=`${ev.length} EV+ · ${data.summary.matches_with_odds||0} cotes · v${data.model_version}`;
}

function cardHTML(m, isEV, isTomorrow){
  const w    = m.winner;
  const ou   = m.over_under;
  const sets = m.sets;
  const feat = m.features;
  const fav  = w.favorite==='player_a'?m.player_a:m.player_b;
  const opp  = w.favorite==='player_a'?m.player_b:m.player_a;
  const prob = Math.round((w.favorite==='player_a'?w.prob_a:w.prob_b)*100);
  const surf = SURF[m.surface]||m.surface;
  const conf = w.confidence||1;
  const cl   = confLabel(conf);

  // Badge EV
  const sign       = w.edge_pct>0?'+':'';
  const badgeClass = w.has_odds?(w.edge_pct>=5?'ev-pos':w.edge_pct<0?'ev-neg':'ev-neu'):'ev-neu';
  const badgeText  = w.has_odds?`${sign}${w.edge_pct?.toFixed(1)}% EV`:'cotes—';

  // ── VAINQUEUR ──
  const favName = fav.split(' ').pop();
  const winStars = confStars(conf, 9);

  // ── OVER/UNDER ──
  // Affichage : "Over 20.5" ou "Under 20.5" avec % de confiance
  const ouRec    = ou.recommendation;
  const ouConf   = ou.confidence||1;
  const ouProb   = ouRec==='OVER'?Math.round(ou.prob_over*100):Math.round(ou.prob_under*100);
  const ouLine   = ou.line;
  const ouLabel  = ouRec==='OVER'?`Over ${ouLine}`:ouRec==='UNDER'?`Under ${ouLine}`:`${ouLine} jeux`;
  const ouClass  = ouRec==='OVER'?'rec-over':ouRec==='UNDER'?'rec-under':'rec-neutral';
  const ouStars  = confStars(ouConf, 7);

  // ── SETS ──
  const setsRec  = sets.recommendation;
  const setsConf = sets.confidence||1;
  const setsProb = setsRec==='2 SETS'?Math.round(sets.prob_2sets*100):Math.round(sets.prob_3sets*100);
  const setsClass = setsRec==='2 SETS'?'rec-2sets':setsRec==='3 SETS'?'rec-3sets':'rec-neutral';
  const setsStars = confStars(setsConf, 7);

  // ── FEATURES ──
  const featHTML = `
    <div class="feat-panel" id="feat_${m.id}" style="display:none">
      <div class="fp-item"><div class="fp-label">Elo global</div><div class="fp-val">${feat.elo_global_diff>0?'+':''}${feat.elo_global_diff}</div></div>
      <div class="fp-item"><div class="fp-label">Elo surface</div><div class="fp-val">${feat.elo_surface_diff>0?'+':''}${feat.elo_surface_diff}</div></div>
      <div class="fp-item"><div class="fp-label">Hold% A</div><div class="fp-val">${feat.hold_pct_a!=null?feat.hold_pct_a+'%':'—'}</div></div>
      <div class="fp-item"><div class="fp-label">Hold% B</div><div class="fp-val">${feat.hold_pct_b!=null?feat.hold_pct_b+'%':'—'}</div></div>
      <div class="fp-item"><div class="fp-label">Forme A</div><div class="fp-val">${feat.winrate_10_a!=null?feat.winrate_10_a+'%':'—'}</div></div>
      <div class="fp-item"><div class="fp-label">Forme B</div><div class="fp-val">${feat.winrate_10_b!=null?feat.winrate_10_b+'%':'—'}</div></div>
      <div class="fp-item"><div class="fp-label">Surf% A</div><div class="fp-val">${feat.surf_winrate_a!=null?feat.surf_winrate_a+'%':'—'}</div></div>
      <div class="fp-item"><div class="fp-label">H2H</div><div class="fp-val">${feat.h2h_total>0?feat.h2h_wins_a+'/'+feat.h2h_total:'—'}</div></div>
      <div class="fp-item"><div class="fp-label">BP saved A</div><div class="fp-val">${feat.bp_saved_a!=null?feat.bp_saved_a+'%':'—'}</div></div>
      <div class="fp-item"><div class="fp-label">Market prob</div><div class="fp-val">${feat.market_prob_a!=null?Math.round(feat.market_prob_a*100)+'%':'—'}</div></div>
    </div>`;

  const tomorrowTag = isTomorrow?`<span class="date-tomorrow">DEMAIN</span>`:'';

  return`<div class="card ${isEV?'ev-play':''}" id="card_${m.id}">
    <div class="conf-bar ${confBarClass(conf)}"></div>
    <div class="card-head">
      <div style="flex:1">
        <div class="card-players">${fav} <em>vs</em> ${opp}</div>
        <div class="card-meta">
          <span>${m.tournament}</span>·<span>${m.round}</span>·
          <span class="time-tag">${m.time}</span>
          ${tomorrowTag}
          <span class="surf-tag">${surf}</span>
        </div>
      </div>
      <span class="ev-badge ${badgeClass}">${badgeText}</span>
    </div>

    <div class="conf-display">
      ${winStars}
      <span class="conf-label ${cl.cls}">${cl.text}</span>
      <span class="conf-label" style="margin-left:4px;opacity:.5">${conf}/5</span>
    </div>

    <div class="pred-grid">
      <div class="pred-cell">
        <div class="pred-label">Vainqueur</div>
        <div class="pred-main" style="color:var(--accent)">${favName} · ${prob}%</div>
        <div class="pred-pct">
          ${winStars}
          <span style="color:var(--text3)">${w.has_odds?`Bet365 ${w.market_odds} · juste ${w.fair_odds}`:'cote non disponible'}</span>
        </div>
        ${w.kelly_pct>0?`<span class="pred-rec rec-over">Stake ${w.kelly_pct}%</span>`:''}
      </div>

      <div class="pred-cell">
        <div class="pred-label">Over / Under jeux</div>
        <div class="pred-main" style="color:${ouRec==='OVER'?'var(--accent)':ouRec==='UNDER'?'var(--green)':'var(--text2)'}">${ouLabel}</div>
        <div class="pred-pct">
          ${ouStars}
          <span style="color:var(--text3)">${ouProb}% de confiance</span>
        </div>
        <span class="pred-rec ${ouClass}">${ouRec==='NEUTRE'?'Neutre':ouLabel}</span>
      </div>

      <div class="pred-cell">
        <div class="pred-label">Nombre de sets</div>
        <div class="pred-main" style="color:${setsRec==='2 SETS'?'var(--accent)':setsRec==='3 SETS'?'var(--orange)':'var(--text2)'}">${setsRec==='NEUTRE'?'Incertain':setsRec}</div>
        <div class="pred-pct">
          ${setsStars}
          <span style="color:var(--text3)">${setsProb}% de confiance</span>
        </div>
        <span class="pred-rec ${setsClass}">${setsRec==='NEUTRE'?'Neutre':setsRec}</span>
      </div>
    </div>

    <div class="reason-bar ${isEV?'':'dim'}">${w.reason}</div>

    <div class="feat-toggle" onclick="toggleFeat('${m.id}')">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3.5l3 3 3-3"/></svg>
      Voir toutes les features
    </div>
    ${featHTML}
  </div>`;
}

function toggleTournament(tid){
  const body = document.getElementById(tid);
  const chev = document.getElementById('chev_'+tid);
  const collapsed = body.classList.toggle('collapsed');
  chev.classList.toggle('open', !collapsed);
}

function toggleFeat(id){
  const p = document.getElementById('feat_'+id);
  const t = p.closest('.card').querySelector('.feat-toggle');
  if(p.style.display==='none'||!p.style.display){
    p.style.display='grid';
    t.innerHTML=t.innerHTML.replace('Voir','Masquer');
  }else{
    p.style.display='none';
    t.innerHTML=t.innerHTML.replace('Masquer','Voir');
  }
}

load();
</script>
</body>
</html>
