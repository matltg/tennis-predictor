name: Daily Tennis Predictions

on:
  schedule:
    - cron: '0 4 * * *'   # 04h00 UTC (06h00 Paris) — run unique quotidien
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch TML-Database (ATP)
        run: |
          mkdir -p /tmp/tml
          BASE="https://raw.githubusercontent.com/Tennismylife/TML-Database/master"
          for year in 2015 2016 2017 2018 2019 2020 2021 2022 2023 2024 2025 2026; do
            curl -sf "$BASE/${year}.csv" -o "/tmp/tml/atp_${year}.csv" && echo "$year OK" || echo "$year non disponible"
          done
          echo "Fichiers TML : $(ls /tmp/tml/*.csv | wc -l)"

      - name: Run compute_elo.py
        run: python scripts/compute_elo.py

      - name: Run fetch_data.py
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/fetch_data.py

      - name: Run run_model.py
        run: python scripts/run_model.py

      - name: Copy outputs to docs/data
        run: |
          mkdir -p docs/data
          cp data/predictions.json docs/data/predictions.json
          cp data/pipeline_log.json docs/data/pipeline_log.json
          [ -f data/history.json ] && cp data/history.json docs/data/history.json || true

      - name: Commit and push
        run: |
          git config user.name "tennis-bot"
          git config user.email "bot@tennis-predictor.io"
          git add docs/data/
          git diff --staged --quiet || git commit -m "🎾 Prédictions $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
